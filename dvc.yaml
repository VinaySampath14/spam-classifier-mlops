stages:
  ingest:
    cmd: python -m src.data_ingestion
    deps:
    - src/data_ingestion.py
    - src/logger.py
    - src/utils.py
    - params.yaml
    params:
    - data_source.url
    - data_source.raw_data_path
    outs:
    - data/raw/spam.csv

  preprocess:
    cmd: python -m src.data_preprocessing
    deps:
    - src/data_preprocessing.py
    - src/logger.py
    - src/utils.py
    - data/raw/spam.csv
    - params.yaml
    params:
    - data_preprocessing.train_path
    - data_preprocessing.test_path
    - data_preprocessing.test_size
    - data_preprocessing.random_state
    - data_source.raw_data_path
    outs:
    - data/processed/train.csv
    - data/processed/test.csv

  feature_engineering:
    cmd: python -m src.feature_engineering
    deps:
    - src/feature_engineering.py
    - src/logger.py
    - src/utils.py
    - data/processed/train.csv
    - data/processed/test.csv
    - params.yaml
    params:
    - feature_engineering.x_train_path
    - feature_engineering.x_test_path
    - feature_engineering.y_train_path
    - feature_engineering.y_test_path
    - feature_engineering.vectorizer_path
    - feature_engineering.max_features
    - feature_engineering.ngram_range
    - data_preprocessing.train_path
    - data_preprocessing.test_path
    outs:
    - data/features/X_train.pkl
    - data/features/X_test.pkl
    - data/features/y_train.csv
    - data/features/y_test.csv
    - models/tfidf_vectorizer.pkl

  train:
    cmd: python -m src.model_building
    deps:
    - src/model_building.py
    - src/logger.py
    - src/utils.py
    - data/features/X_train.pkl
    - data/features/y_train.csv
    - params.yaml
    params:
    - model_building.model_path
    - model_building.max_iter
    - model_building.random_state
    - feature_engineering.x_train_path
    - feature_engineering.y_train_path
    outs:
    - models/logistic_regression_model.pkl

  evaluate:
    cmd: python -m src.model_evaluation
    deps:
    - src/model_evaluation.py
    - src/logger.py
    - src/utils.py
    - data/features/X_test.pkl
    - data/features/y_test.csv
    - models/logistic_regression_model.pkl
    - params.yaml
    params:
    - model_evaluation.metrics_path
    - feature_engineering.x_test_path
    - feature_engineering.y_test_path
    - model_building.model_path
    metrics:
    - reports/metrics.json
params:
- dvclive/params.yaml
metrics:
- dvclive/metrics.json
plots:
- dvclive/plots/metrics:
    x: step
